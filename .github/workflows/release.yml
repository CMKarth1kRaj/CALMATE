name: Auto Release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: rymndhng/release-on-push-action@v0.28.0
      with:
        bump_version_scheme: minor
        tag_prefix: v
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
